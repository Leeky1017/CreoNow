name: "CI: creonow-app"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: creonow-app/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: creonow-app
      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: creonow-app
      - name: ESLint
        run: npm run lint
        working-directory: creonow-app
      - name: Prettier
        run: npm run format:check
        working-directory: creonow-app

  test:
    name: Test
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: creonow-app/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: creonow-app
      - name: Run coverage
        run: npm run test:coverage
        working-directory: creonow-app
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: creonow-app/coverage/
          retention-days: 14

  build:
    name: Build
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: creonow-app/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: creonow-app
      - name: Next.js build
        run: npm run build
        working-directory: creonow-app
      - name: Storybook build
        run: npm run storybook:build
        working-directory: creonow-app
