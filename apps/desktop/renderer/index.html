<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CreoNow Desktop</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0f1115;
        color: #f5f7fa;
      }

      #app {
        min-height: 100vh;
      }

      /* ProseMirror editor base styles */
      .ProseMirror {
        outline: none;
        min-height: 200px;
      }

      .ProseMirror p {
        margin: 0 0 8px;
      }

      .ProseMirror h1, .ProseMirror h2, .ProseMirror h3 {
        margin: 0 0 12px;
        font-weight: 600;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
