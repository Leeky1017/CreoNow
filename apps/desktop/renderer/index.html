<!doctype html>
<html lang="zh-CN">

      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CreoNow Desktop</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,

        padding: 24px;
        text-align: center;

      h1 {

        margin: 0;
        color: #b6bec8;

  <body>
    <main>

      <p>Renderer shell is ready for the Electron production bundle.</p>
